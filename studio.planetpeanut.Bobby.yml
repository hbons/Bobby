app-id: studio.planetpeanut.Bobby
command: bobby

runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    RUST_BACKTRACE: '1'

finish-args:
  - --device=dri
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland

modules:
  - name: bobby
    buildsystem: meson
    builddir: true
    sources:
      - type: archive
        url: https://github.com/hbons/Bobby/releases/download/50.0.0/Bobby-50.0.0.tar.xz
        sha256: 1b4547fdb54f87ca6b206e1cd29a228ea9132ad7ebb0706b3f0e149b7a56f4ee
